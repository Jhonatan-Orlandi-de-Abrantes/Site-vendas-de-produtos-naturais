<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Entrar — LojaNatural</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
</head>

<body>
<header class="topbar">
    <div class="container">
        <a class="brand" href="index.html">LojaNatural</a>
    </div>
</header>

<main>
    <section class="auth">
        <h2 style="color:var(--accent-dark);margin-bottom:8px">Entrar na sua conta</h2>

        <!-- FORMULÁRIO DE LOGIN LOCAL -->
        <!-- 🔧 Backend: Enviar email/password para endpoint real, ex.: POST /api/auth/login 
        -->
        <form id="loginForm">
            <label>E-mail: <input name="email" type="email" required></label>
            <label>Senha: <input name="password" type="password" required></label>
            <button class="btn" type="submit">Entrar</button>
        </form>

        <p style="margin:16px 0;text-align:center;font-size:14px;color:var(--text-muted)">ou continue com</p>

        <!-- 🔧 LOGIN SOCIAL -->
        <!-- 🔧 Backend: Integrações exigirão configuração de OAuth no backend + redirecionamento de callback -->
        <div class="social-login">

            <!-- GOOGLE -->
            <!-- 🔧 Backend: deve gerar URL OAuth do Google. Exemplo futuro: GET /auth/google -->
            <button class="btn oauth google" id="googleLogin">
                <img src="assets/icons/google.svg" width="18"> Entrar com Google
            </button>

            <!-- FACEBOOK -->
            <!-- 🔧 Backend: deve gerar URL OAuth do Facebook. Exemplo futuro: GET /auth/facebook -->
            <button class="btn oauth facebook" id="facebookLogin">
                <img src="assets/icons/facebook.svg" width="18"> Entrar com Facebook
            </button>
        </div>

        <p style="margin-top:10px" class="small-muted">
            <a href="#" id="forgotLink">Esqueceu a senha?</a>
        </p>
        
        <p style="margin-top:10px">
            <a href="#" onclick="logout()">Sair</a>
        </p>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <div>© <span id="year"></span> LojaNatural</div>
        <div>
            <a href="privacy.html">Política de privacidade</a> 
            &nbsp;•&nbsp;
            <a href="terms.html">Termos de uso</a> 
            &nbsp;•&nbsp;
            <a href="about.html">Quem somos</a>
            &nbsp;•&nbsp;
            <a href="contact.html">Contato</a>
        </div>
    </div>
</footer>

<script>
    document.getElementById("year").innerText = new Date().getFullYear();

    // 🔧 BACKEND: Substituir estes "window.location.href" para receber URL da API OpenID Connect / OAuth

    document.getElementById("googleLogin").onclick = () => {
        window.location.href = "/auth/google"; 
    };

    document.getElementById("facebookLogin").onclick = () => {
        window.location.href = "/auth/facebook";
    };

    document.getElementById("githubLogin").onclick = () => {
        window.location.href = "/auth/github";
    };
</script>

</body>
</html>
